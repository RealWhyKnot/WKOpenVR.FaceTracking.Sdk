name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Package version without leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: package
    runs-on: windows-2025-vs2026
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Validate workflow scripts
        shell: pwsh
        run: |
          ./.github/scripts/Test-WorkflowSyntax.ps1
          ./.github/scripts/Test-NightlyBetaPlan.ps1
          ./.github/scripts/Test-GenerateReleaseNotes.ps1

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-sdk-release-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            nuget-sdk-release-${{ runner.os }}-

      - name: Build tagged package
        id: package
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:TAG_NAME -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($version)) { throw "Release version is empty." }
          if ($version -match '-beta' -and $version -notmatch '^\d{4}\.\d+\.\d+\.\d+-beta$') {
            throw "Beta versions must use YYYY.M.D.N-beta."
          }

          .\build.ps1 -Configuration Release -Version $version
          .\test.ps1 -Configuration Release

          $packages = @(Get-ChildItem -Path "artifacts/packages" -Filter "WKOpenVR.FaceTracking.Sdk.*.nupkg")
          if ($packages.Count -eq 0) {
            throw "No SDK package was created."
          }
          $isBeta = $version -match '-beta$'
          $tag = $env:TAG_NAME
          if ($env:REF_TYPE -ne "tag") {
            $tag = "v$version"
          }
          $artifactPaths = [string[]]@($packages | ForEach-Object { $_.FullName })
          $notesOutput = & .\.github\scripts\Generate-ReleaseNotes.ps1 `
            -Tag $tag `
            -Repo '${{ github.repository }}' `
            -PackageName 'WKOpenVR Face Tracking SDK' `
            -ArtifactPath $artifactPaths
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $notes = ($notesOutput -join [System.Environment]::NewLine) + [System.Environment]::NewLine
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          [System.IO.File]::WriteAllText($notesPath, $notes, (New-Object System.Text.UTF8Encoding($false)))

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "is_beta=$($isBeta.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: wkopenvr-face-sdk-${{ github.ref_name }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
          IS_BETA: ${{ steps.package.outputs.is_beta }}
          NOTES_PATH: ${{ steps.package.outputs.notes_path }}
        run: |
          $assets = @(Get-ChildItem -Path "artifacts/packages" -Filter "WKOpenVR.FaceTracking.Sdk.*.nupkg" | ForEach-Object { $_.FullName })
          if ($assets.Count -eq 0) { throw "No release assets found." }

          $extra = @()
          if ($env:IS_BETA -eq "true") { $extra = @("--prerelease", "--latest=false") }

          gh release create $env:TAG_NAME --title $env:TAG_NAME --notes-file $env:NOTES_PATH @extra @assets
